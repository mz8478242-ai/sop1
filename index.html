<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>今日 SOP</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0e0c;--surface:#1a1916;--surface2:#222118;--border:#2e2c26;
  --text:#e8e4d9;--muted:#6b6860;
  --amber:#d4a843;--amber-dim:#7a5e1e;
  --coral:#d4695a;--green:#6aaa6a;--blue:#6b9fd4;--purple:#9b7fd4;--teal:#4aada0;
  --done-bg:#1e2b1e;--done-border:#3a5a3a;--radius:14px;
  --bg-overlay:rgba(15,14,12,0.82);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
#bgLayer{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;background-repeat:no-repeat;}
body{color:var(--text);font-family:'Noto Serif SC',serif;min-height:100vh;padding-bottom:70px;}
body:not(.has-bg){background:var(--bg);}
body.has-bg .tabs,body.has-bg .header{background:var(--bg-overlay)!important;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
body.has-bg .task{background:rgba(26,25,22,0.78);}
body.has-bg .note-area{background:rgba(34,33,24,0.78);}
body.has-bg .popup-card{background:rgba(26,25,22,0.96);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:200;}
.tab{flex:1;padding:13px 0;text-align:center;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab-icon{font-size:16px;padding:11px 0;}

/* HEADER */
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 10px;position:sticky;top:44px;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;}
.header h1{font-size:19px;font-weight:600;letter-spacing:.04em;color:var(--amber);}
.header .date{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;}
.header-btns{display:flex;gap:6px;align-items:flex-start;}
.reset-btn,.today-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Noto Serif SC',serif;font-size:11px;padding:5px 9px;border-radius:20px;cursor:pointer;}
.reset-btn:active,.today-btn:active{background:var(--border);}
.today-btn{color:var(--amber);border-color:var(--amber-dim);}

/* WEEK NAV — scrollable strip */
.week-strip-wrap{position:relative;overflow:hidden;padding:10px 36px 0;}
.week-strip{display:flex;gap:4px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.week-strip::-webkit-scrollbar{display:none;}
.week-day{flex-shrink:0;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 5px;border-radius:8px;transition:background .15s;min-width:40px;}
.week-day.selected .wd-dot{border-color:var(--amber);border-width:2px;}
.week-day.selected .wd-label{color:var(--amber);}
.wd-dot{width:32px;height:32px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .3s;}
.wd-dot.full{background:var(--amber);border-color:var(--amber);color:#0f0e0c;font-weight:700;}
.wd-dot.partial{background:var(--amber-dim);border-color:var(--amber-dim);}
.wd-dot.today-ring{border-color:var(--amber);border-width:2px;}
.wd-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
.strip-arrow{position:absolute;top:50%;transform:translateY(-30%);background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2;}
.strip-arrow:active{background:var(--border);}
.strip-arrow.left{left:4px;}
.strip-arrow.right{right:4px;}

/* PROGRESS */
.progress-wrap{margin-top:8px;}
.progress-row{display:flex;justify-content:space-between;margin-bottom:4px;}
.progress-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.progress-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--amber);}
.progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* BLOCKS */
.block{margin:12px 12px 0;}
.block-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:0 4px;}
.block-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.block-title{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.block-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto;}

/* TASK */
.task-wrap{margin-bottom:7px;}
.task{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);user-select:none;-webkit-user-select:none;position:relative;overflow:hidden;}
.task::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--task-color,var(--border));transition:background .3s;}
.task:active{transform:scale(.98);}
.task.done{background:var(--done-bg);border-color:var(--done-border);opacity:.7;}
.task.done::before{background:var(--green);}
.task.readonly{cursor:default;}
.task.readonly:active{transform:none;}
.task.has-note{border-radius:var(--radius) var(--radius) 0 0;}
.check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s cubic-bezier(.4,0,.2,1);background:var(--surface2);}
.task.done .check{background:var(--green);border-color:var(--green);}
.check svg{opacity:0;transform:scale(.5);transition:all .25s cubic-bezier(.4,0,.2,1);}
.task.done .check svg{opacity:1;transform:scale(1);}
.task-content{flex:1;min-width:0;}
.task-name{font-size:14px;color:var(--text);transition:color .3s;}
.task.done .task-name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--done-border);}
.task-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
.task-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;}
.task.done .task-time{opacity:.5;}
.task-actions{display:flex;gap:2px;flex-shrink:0;}
.note-btn,.del-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:2px;opacity:.6;transition:opacity .2s;}
.note-btn:active,.del-btn:active{opacity:1;}
.del-btn{color:var(--coral);}

/* NOTE AREA */
.note-area{background:var(--surface2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:10px 13px;display:none;}
.note-area.open{display:block;}
.note-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;}
.note-area textarea{width:100%;background:none;border:none;color:var(--text);font-family:'Noto Serif SC',serif;font-size:13px;resize:none;outline:none;min-height:40px;line-height:1.6;}
.note-area textarea::placeholder{color:var(--muted);}
.note-btn-row{display:flex;gap:6px;margin-top:7px;}
.note-img-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;font-family:'Noto Serif SC',serif;}
.note-img-btn:active{background:var(--border);}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:7px;}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--surface);}
.photo-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer;}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);border:none;color:#fff;width:20px;height:20px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ADD TASK BUTTON */
.add-task-btn{margin:10px 12px 0;background:none;border:1px dashed var(--border);color:var(--muted);font-family:'Noto Serif SC',serif;font-size:13px;padding:11px;border-radius:var(--radius);cursor:pointer;width:calc(100% - 24px);text-align:center;transition:all .2s;}
.add-task-btn:active{background:var(--surface);}

/* ADD TASK MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,14,12,.88);z-index:600;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 36px;transform:translateY(20px);transition:transform .25s;}
.modal-overlay.show .modal-sheet{transform:translateY(0);}
.modal-title{font-size:15px;font-weight:600;color:var(--amber);margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;margin-top:-4px;}
.field-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.field-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Noto Serif SC',serif;font-size:14px;padding:10px 12px;border-radius:10px;outline:none;margin-bottom:12px;}
.field-input:focus{border-color:var(--amber-dim);}
.field-row{display:flex;gap:10px;}
.field-row .field-wrap{flex:1;}
.color-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.color-chip{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
.color-chip.selected{border-color:var(--text);transform:scale(1.2);}
.toggle-row{display:flex;gap:8px;margin-bottom:14px;}
.toggle-chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;}
.toggle-chip.on{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
.btn-save{background:var(--amber);color:#0f0e0c;border:none;font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;padding:12px;border-radius:20px;cursor:pointer;width:100%;}
.btn-save:active{opacity:.8;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:800;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.lightbox.show{opacity:1;pointer-events:all;}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain;}

/* SETTINGS */
#settingsView{padding:20px;}
.settings-title{font-size:16px;font-weight:600;color:var(--amber);margin-bottom:18px;}
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.settings-label{font-size:14px;color:var(--text);margin-bottom:12px;font-weight:600;}
.settings-hint{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px;line-height:1.6;}
.bg-preview{width:100%;height:120px;border-radius:10px;object-fit:cover;display:none;margin-bottom:12px;border:1px solid var(--border);}
.bg-preview.show{display:block;}
.btn-primary{background:var(--amber);color:#0f0e0c;border:none;font-family:'Noto Serif SC',serif;font-size:13px;font-weight:600;padding:11px;border-radius:20px;cursor:pointer;width:100%;}
.btn-primary:active{opacity:.8;}
.btn-danger{background:none;border:1px solid var(--coral);color:var(--coral);font-family:'Noto Serif SC',serif;font-size:13px;padding:10px;border-radius:20px;cursor:pointer;width:100%;margin-top:10px;}
.btn-danger:active{opacity:.7;}
.overlay-row{display:flex;align-items:center;gap:10px;margin-top:12px;}
.overlay-row span{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
.overlay-slider{flex:1;accent-color:var(--amber);}

/* YEAR */
#yearView{padding:14px;}
.year-title{font-size:16px;font-weight:600;color:var(--amber);text-align:center;margin-bottom:16px;}
.months-grid{display:flex;flex-direction:column;gap:20px;}
.month-name{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:7px;letter-spacing:.1em;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day-cell{aspect-ratio:1;border-radius:4px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);cursor:pointer;transition:all .15s;}
.day-cell:active{opacity:.7;}
.day-cell.empty{background:none;border-color:transparent;cursor:default;}
.day-cell.full{background:var(--amber);border-color:var(--amber);color:#0f0e0c;font-weight:700;}
.day-cell.partial{background:var(--amber-dim);border-color:var(--amber-dim);color:#e8d4a0;}
.day-cell.today-cell{border-color:var(--amber);border-width:2px;color:var(--amber);}
.weekday-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.weekday-hd{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);text-align:center;}

/* DAY POPUP */
.day-popup{position:fixed;inset:0;background:rgba(15,14,12,.92);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;}
.day-popup.show{opacity:1;pointer-events:all;}
.popup-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:360px;padding:18px;max-height:80vh;overflow-y:auto;}
.popup-date{font-size:14px;font-weight:600;color:var(--amber);margin-bottom:12px;}
.popup-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;margin-top:-4px;}
.popup-item{padding:7px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:9px;}
.popup-item:last-child{border-bottom:none;}
.popup-check{width:17px;height:17px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.popup-check.no{background:var(--surface2);border:1px solid var(--border);}
.popup-item-text{font-size:13px;}
.popup-note{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;}
.popup-photos{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.popup-photos img{width:52px;height:52px;border-radius:6px;object-fit:cover;cursor:pointer;}
.popup-empty{font-size:13px;color:var(--muted);text-align:center;padding:20px 0;}

/* CELEBRATE */
.celebrate{position:fixed;inset:0;background:rgba(15,14,12,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .4s;}
.celebrate.show{opacity:1;pointer-events:all;}
.celebrate-emoji{font-size:68px;animation:bounce .6s ease infinite alternate;}
.celebrate-text{font-size:22px;font-weight:600;color:var(--amber);margin-top:18px;}
.celebrate-sub{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-top:7px;}
.celebrate-close{margin-top:28px;background:var(--amber);color:var(--bg);border:none;font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;padding:12px 32px;border-radius:30px;cursor:pointer;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.07)}100%{transform:scale(1)}}
.task.just-done{animation:pop .3s ease;}
.particle{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:998;animation:fall 1.2s ease forwards;}
@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(200px) rotate(360deg)}}
.all-done-banner{margin:12px;background:linear-gradient(135deg,#1a2a1a,#1e2e1e);border:1px solid var(--done-border);border-radius:var(--radius);padding:14px;text-align:center;display:none;}
.all-done-banner.show{display:block;}
.all-done-banner .emoji{font-size:30px;}
.all-done-banner p{color:var(--green);font-size:14px;margin-top:7px;}
.all-done-banner small{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);display:block;margin-top:3px;}
.view-hidden{display:none!important;}
</style>
</head>
<body>
<div id="bgLayer"></div>

<div class="tabs">
  <div class="tab active" id="tab-daily" onclick="switchTab('daily')">每日打卡</div>
  <div class="tab" id="tab-year" onclick="switchTab('year')">年度总览</div>
  <div class="tab tab-icon" id="tab-settings" onclick="switchTab('settings')">⚙️</div>
</div>

<!-- DAILY -->
<div id="dailyView">
  <div class="header">
    <div class="header-top">
      <div><h1 id="headerTitle">今日 SOP</h1><div class="date" id="dateStr"></div></div>
      <div class="header-btns">
        <button class="today-btn" onclick="goToday()">今天</button>
        <button class="reset-btn" onclick="resetDay()">重置</button>
      </div>
    </div>
    <!-- Scrollable date strip: 2 weeks back + 2 weeks forward = 4 weeks total -->
    <div class="week-strip-wrap">
      <button class="strip-arrow left" onclick="scrollStrip(-1)">‹</button>
      <div class="week-strip" id="weekStrip"></div>
      <button class="strip-arrow right" onclick="scrollStrip(1)">›</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-row"><span class="progress-label">进度</span><span class="progress-count" id="progressCount">0/0</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>
  <div id="appContent"></div>
  <button class="add-task-btn" onclick="openAddModal()">＋ 添加自定义任务</button>
</div>

<!-- YEAR -->
<div id="yearView" class="view-hidden">
  <div class="year-title">2026 全年打卡</div>
  <div id="yearGrid"></div>
</div>

<!-- SETTINGS -->
<div id="settingsView" class="view-hidden">
  <div class="settings-title">⚙️ 设置</div>
  <div class="settings-card">
    <div class="settings-label">🖼️ 背景图片</div>
    <img id="bgPreview" class="bg-preview" src="" alt="">
    <input type="file" id="bgFileInput" accept="image/*" style="display:none" onchange="handleBgUpload(this)">
    <button class="btn-primary" onclick="document.getElementById('bgFileInput').click()">选择本地图片</button>
    <div class="overlay-row">
      <span>遮罩深度</span>
      <input type="range" class="overlay-slider" id="overlaySlider" min="0" max="95" value="82" oninput="updateOverlay(this.value)">
      <span id="overlayVal">82%</span>
    </div>
    <div class="settings-hint">图片仅保存在本地，不会上传 · 遮罩越深文字越清晰</div>
    <button class="btn-danger" onclick="removeBg()">移除背景图片</button>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closeAddModal()">×</button>
    <div class="modal-title">添加任务</div>

    <div class="field-label">任务名称</div>
    <input class="field-input" id="newTaskName" placeholder="例：喝水 2L、冥想 10 分钟">

    <div class="field-row">
      <div class="field-wrap">
        <div class="field-label">开始时间</div>
        <input class="field-input" id="newTaskTimeStart" placeholder="09:00" type="time">
      </div>
      <div class="field-wrap">
        <div class="field-label">结束时间（可选）</div>
        <input class="field-input" id="newTaskTimeEnd" placeholder="09:30" type="time">
      </div>
    </div>

    <div class="field-label">颜色标签</div>
    <div class="color-row" id="colorRow"></div>

    <div class="field-label">功能</div>
    <div class="toggle-row">
      <div class="toggle-chip" id="toggleNote" onclick="toggleChip('toggleNote')">✏️ 备注</div>
      <div class="toggle-chip" id="togglePhoto" onclick="toggleChip('togglePhoto')">📷 照片</div>
    </div>

    <button class="btn-save" onclick="saveNewTask()">保存任务</button>
  </div>
</div>

<!-- Popups -->
<div class="day-popup" id="dayPopup">
  <div class="popup-card">
    <button class="popup-close" onclick="closePopup()">×</button>
    <div class="popup-date" id="popupDate"></div>
    <div id="popupContent"></div>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" src="" alt="">
</div>
<div class="celebrate" id="celebrate">
  <div class="celebrate-emoji">🎉</div>
  <div class="celebrate-text">今天全部完成！</div>
  <div class="celebrate-sub" id="celebrateSub"></div>
  <button class="celebrate-close" onclick="document.getElementById('celebrate').classList.remove('show')">太好了！</button>
</div>

<script>
// ══ DEFAULT TASKS ══
const DEFAULT_TASKS=[

// ══ BLOCK DEFS ══
const BLOCK_ORDER=['morning','work_am','lunch','work_pm','dinner','sport','evening'];
const BLOCKS={
  morning:{label:'早晨',    color:'#d4a843'},
  work_am:{label:'上午工作',color:'#6b9fd4'},
  lunch:  {label:'午饭',    color:'#d4695a'},
  work_pm:{label:'下午工作',color:'#6b9fd4'},
  dinner: {label:'晚饭',    color:'#d4695a'},
  sport:  {label:'运动',    color:'#6aaa6a'},
  evening:{label:'晚间',    color:'#9b7fd4'},
};

const COLORS=['#d4a843','#4aada0','#d4695a','#6aaa6a','#6b9fd4','#9b7fd4','#6b6860','#d4695a'];

// ══ CUSTOM TASK STORAGE ══
function loadCustomTasks(){try{return JSON.parse(localStorage.getItem('sop_custom_tasks'))||[];}catch{return [];}}
function saveCustomTasks(arr){localStorage.setItem('sop_custom_tasks',JSON.stringify(arr));}

function getAllTasks(){
  const custom=loadCustomTasks();
  return [...DEFAULT_TASKS,...custom].sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
}

function timeToMin(t){
  if(!t)return 0;
  const [h,m]=(t||'00:00').split(':').map(Number);
  return h*60+(m||0);
}

function formatTimeRange(t,te){
  if(!te)return t;
  return `${t}–${te}`;
}

// assign block by time
function timeToBlock(t){
  const m=timeToMin(t);
  if(m<570)return'morning';      // <09:30
  if(m<720)return'work_am';      // <12:00
  if(m<810)return'lunch';        // <13:30
  if(m<1020)return'work_pm';     // <17:00
  if(m<1110)return'dinner';      // <18:30
  if(m<1170)return'sport';       // <19:30
  return'evening';
}

// ══ HELPERS ══
let viewingDate=new Date();

function dateKey(d){return`sop_${d.getFullYear()}_${String(d.getMonth()).padStart(2,'0')}_${String(d.getDate()).padStart(2,'0')}`;}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function isFuture(d){const t=new Date();t.setHours(0,0,0,0);const dd=new Date(d);dd.setHours(0,0,0,0);return dd>t;}
function loadDayData(d){try{return JSON.parse(localStorage.getItem(dateKey(d)))||{};}catch{return {};}}
function saveDayData(d,data){localStorage.setItem(dateKey(d),JSON.stringify(data));}
function getMopDay(d){return Math.floor((d-new Date(2024,0,1))/86400000)%2===0;}

function effectiveTasks(d){
  const all=getAllTasks();
  return all.filter(t=>t.id!=='mop'||getMopDay(d));
}

// ══ TABS ══
function switchTab(tab){
  ['daily','year','settings'].forEach(v=>{
    document.getElementById(v+'View').classList.toggle('view-hidden',tab!==v);
    document.getElementById('tab-'+v).classList.toggle('active',tab===v);
  });
  if(tab==='year')renderYear();
}

// ══ DATE STRIP (±2 weeks = 29 days centred on today) ══
function buildStrip(){
  const today=new Date();
  const labels=['日','一','二','三','四','五','六'];
  const strip=document.getElementById('weekStrip');
  strip.innerHTML='';
  // -14 days to +14 days
  for(let i=-14;i<=14;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    const data=loadDayData(d);const tasks=effectiveTasks(d);
    const done=tasks.filter(t=>data[t.id+'_done']).length;
    const future=isFuture(d);const todayFlag=isToday(d);
    const sel=dateKey(d)===dateKey(viewingDate);
    let dotCls='wd-dot';let sym=d.getDate();
    if(todayFlag)dotCls+=' today-ring';
    if(!future&&tasks.length){if(done===tasks.length){dotCls+=' full';sym='✓';}else if(done>0)dotCls+=' partial';}
    const el=document.createElement('div');
    el.className='week-day'+(sel?' selected':'');
    el.dataset.offset=i;
    el.innerHTML=`<div class="${dotCls}">${sym}</div><div class="wd-label">${labels[d.getDay()]}</div>`;
    el.addEventListener('click',()=>selectDay(new Date(d)));
    strip.appendChild(el);
  }
  // scroll selected into view
  setTimeout(()=>{
    const sel=strip.querySelector('.selected');
    if(sel)sel.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  },50);
}

function scrollStrip(dir){
  const strip=document.getElementById('weekStrip');
  strip.scrollBy({left:dir*120,behavior:'smooth'});
}

function selectDay(d){
  viewingDate=d;
  buildStrip();
  renderDailyView();
}

function goToday(){
  viewingDate=new Date();
  buildStrip();
  renderDailyView();
}

// ══ DAILY RENDER ══
function renderDailyView(){
  const d=viewingDate,past=!isToday(d)&&!isFuture(d),future=isFuture(d);
  const dayNames=['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('dateStr').textContent=`${d.getMonth()+1}月${d.getDate()}日 ${dayNames[d.getDay()]}${isToday(d)?' · 今天':''}`;
  document.getElementById('headerTitle').textContent=future?'计划预填':past?'历史记录':'今日 SOP';

  const data=loadDayData(d),tasks=effectiveTasks(d);
  updateProgress(data,tasks);

  // Group tasks by block
  const grouped={};
  tasks.forEach(t=>{
    const blk=t.block||timeToBlock(t.time);
    if(!grouped[blk])grouped[blk]=[];
    grouped[blk].push(t);
  });

  let html='';
  BLOCK_ORDER.forEach(blk=>{
    const list=grouped[blk];if(!list||!list.length)return;
    const b=BLOCKS[blk];
    // compute time range for block
    const times=list.map(t=>t.time).filter(Boolean);
    const ends=list.map(t=>t.timeEnd).filter(Boolean);
    const blockStart=times.length?times.reduce((a,b)=>timeToMin(a)<timeToMin(b)?a:b):'';
    const blockEnd=ends.length?ends.reduce((a,b)=>timeToMin(a)>timeToMin(b)?a:b):'';
    const blockTimeStr=blockStart?(blockEnd?`${blockStart}–${blockEnd}`:blockStart):'';

    html+=`<div class="block"><div class="block-header">
      <div class="block-dot" style="background:${b.color}"></div>
      <span class="block-title">${b.label}</span>
      <span class="block-time">${blockTimeStr}</span></div>`;

    list.forEach(t=>{
      const done=!!data[t.id+'_done'];
      const noteVal=data[t.id+'_note']||'';
      const photos=data[t.id+'_photos']||[];
      const noteOpen=noteVal.length>0||photos.length>0;
      const hasNote=!!t.hasNote,hasPhoto=!!t.hasPhoto;
      const isCustom=!DEFAULT_TASKS.find(dt=>dt.id===t.id);
      const checkClick=future?'':'onclick="toggle(\''+t.id+'\')"';
      const timeDisplay=formatTimeRange(t.time,t.timeEnd);

      html+=`<div class="task-wrap">
        <div class="task${done?' done':''}${future?' readonly':''}${hasNote?' has-note':''}" id="task_${t.id}"
             style="--task-color:${t.color}" ${checkClick}>
          <div class="check"><svg width="11" height="9" viewBox="0 0 12 10" fill="none">
            <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="task-content">
            <div class="task-name">${t.name}</div>
            ${t.sub?`<div class="task-sub">${t.sub}</div>`:''}
          </div>
          <div class="task-time">${timeDisplay}</div>
          <div class="task-actions">
            ${hasNote?`<button class="note-btn" onclick="event.stopPropagation();toggleNote('${t.id}')">✏️</button>`:''}
            ${isCustom?`<button class="del-btn" onclick="event.stopPropagation();deleteCustomTask('${t.id}')">🗑</button>`:''}
          </div>
        </div>
        ${hasNote?`<div class="note-area${noteOpen?' open':''}" id="note_${t.id}">
          <div class="note-tag">${t.noteLabel||'备注'}</div>
          <textarea id="notetext_${t.id}" placeholder="${t.noteLabel||'写点什么...'}"
            onblur="saveNote('${t.id}')" oninput="autoResize(this)">${noteVal}</textarea>
          ${hasPhoto?`<div class="note-btn-row">
            <button class="note-img-btn" onclick="triggerPhoto('${t.id}')">📷 添加照片</button>
          </div>
          <input type="file" id="photoinput_${t.id}" accept="image/*" style="display:none" onchange="handlePhoto('${t.id}',this)">
          <div class="photo-grid" id="photogrid_${t.id}">${renderPhotos(t.id,photos)}</div>`:''}
        </div>`:''}
      </div>`;
    });
    html+=`</div>`;
  });

  if(!future)html+=`<div class="all-done-banner" id="allDoneBanner"><div class="emoji">🏆</div><p>SOP 全部完成！</p><small>你真的很厉害 ✨</small></div>`;
  document.getElementById('appContent').innerHTML=html;
  if(!future&&tasks.every(t=>data[t.id+'_done']))document.getElementById('allDoneBanner')?.classList.add('show');
}

function renderPhotos(id,photos){
  return photos.map((src,pi)=>`<div class="photo-thumb">
    <img src="${src}" onclick="openLightbox('${src}')">
    <button class="photo-del" onclick="deletePhoto('${id}',${pi})">×</button>
  </div>`).join('');
}

// ══ TASK ACTIONS ══
function toggle(id){
  if(isFuture(viewingDate))return;
  const data=loadDayData(viewingDate);
  data[id+'_done']=!data[id+'_done'];
  saveDayData(viewingDate,data);
  const tasks=effectiveTasks(viewingDate);
  updateProgress(data,tasks);
  renderDailyView();buildStrip();
  const el=document.getElementById('task_'+id);
  if(el&&data[id+'_done']){el.classList.add('just-done');el.addEventListener('animationend',()=>el.classList.remove('just-done'),{once:true});spawnParticles(el);}
  if(isToday(viewingDate)&&tasks.every(t=>data[t.id+'_done']))setTimeout(()=>showCelebration(tasks.length),400);
}

function toggleNote(id){
  const a=document.getElementById('note_'+id);if(!a)return;
  a.classList.toggle('open');
  if(a.classList.contains('open'))setTimeout(()=>document.getElementById('notetext_'+id)?.focus(),50);
}

function saveNote(id){
  const el=document.getElementById('notetext_'+id);if(!el)return;
  const data=loadDayData(viewingDate);data[id+'_note']=el.value;saveDayData(viewingDate,data);
}

function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

function triggerPhoto(id){document.getElementById('photoinput_'+id)?.click();}
function handlePhoto(id,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const data=loadDayData(viewingDate);
    if(!data[id+'_photos'])data[id+'_photos']=[];
    if(data[id+'_photos'].length>=6){alert('最多6张');return;}
    data[id+'_photos'].push(e.target.result);saveDayData(viewingDate,data);
    const g=document.getElementById('photogrid_'+id);if(g)g.innerHTML=renderPhotos(id,data[id+'_photos']);
  };
  reader.readAsDataURL(file);input.value='';
}
function deletePhoto(id,pi){
  const data=loadDayData(viewingDate);
  if(!data[id+'_photos'])return;
  data[id+'_photos'].splice(pi,1);saveDayData(viewingDate,data);
  const g=document.getElementById('photogrid_'+id);if(g)g.innerHTML=renderPhotos(id,data[id+'_photos']);
}
function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('show');}

function updateProgress(data,tasks){
  const total=tasks.length,done=tasks.filter(t=>data[t.id+'_done']).length;
  document.getElementById('progressCount').textContent=`${done} / ${total}`;
  document.getElementById('progressFill').style.width=`${total?done/total*100:0}%`;
}
function resetDay(){if(!confirm('确定重置这天的打卡记录？'))return;saveDayData(viewingDate,{});renderDailyView();buildStrip();}

// ══ ADD CUSTOM TASK ══
let selectedColor=COLORS[0];
let chipStates={toggleNote:false,togglePhoto:false};

function openAddModal(){
  // build color chips
  const row=document.getElementById('colorRow');
  row.innerHTML=COLORS.map((c,i)=>`<div class="color-chip${i===0?' selected':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join('');
  selectedColor=COLORS[0];
  chipStates={toggleNote:false,togglePhoto:false};
  document.getElementById('toggleNote').classList.remove('on');
  document.getElementById('togglePhoto').classList.remove('on');
  document.getElementById('newTaskName').value='';
  document.getElementById('newTaskTimeStart').value='';
  document.getElementById('newTaskTimeEnd').value='';
  document.getElementById('addModal').classList.add('show');
  setTimeout(()=>document.getElementById('newTaskName').focus(),100);
}

function closeAddModal(){document.getElementById('addModal').classList.remove('show');}

function pickColor(c,el){
  selectedColor=c;
  document.querySelectorAll('.color-chip').forEach(ch=>ch.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleChip(id){
  chipStates[id]=!chipStates[id];
  document.getElementById(id).classList.toggle('on',chipStates[id]);
  if(id==='togglePhoto'&&chipStates[id]){
    chipStates['toggleNote']=true;
    document.getElementById('toggleNote').classList.add('on');
  }
}

function saveNewTask(){
  const name=document.getElementById('newTaskName').value.trim();
  const timeStart=document.getElementById('newTaskTimeStart').value;
  const timeEnd=document.getElementById('newTaskTimeEnd').value;
  if(!name){alert('请填写任务名称');return;}
  if(!timeStart){alert('请填写开始时间');return;}

  const custom=loadCustomTasks();
  const id='custom_'+Date.now();
  const task={
    id,
    name,
    time:timeStart,
    timeEnd:timeEnd||'',
    color:selectedColor,
    hasNote:chipStates['toggleNote'],
    hasPhoto:chipStates['togglePhoto'],
    noteLabel:name,
    isCustom:true,
  };
  if(task.hasNote)task.noteLabel=name;
  custom.push(task);
  saveCustomTasks(custom);
  closeAddModal();
  renderDailyView();
  buildStrip();
}

function deleteCustomTask(id){
  if(!confirm('删除这个任务？'))return;
  const custom=loadCustomTasks().filter(t=>t.id!==id);
  saveCustomTasks(custom);
  renderDailyView();buildStrip();
}

// ══ PARTICLES / CELEBRATE ══
function spawnParticles(el){
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  ['#d4a843','#4aada0','#6aaa6a','#9b7fd4','#d4695a'].forEach((c,i)=>{
    const p=document.createElement('div');p.className='particle';
    p.style.cssText=`left:${cx+(Math.random()-.5)*60}px;top:${cy}px;background:${c};animation-delay:${i*.05}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1400);
  });
}
function showCelebration(count){
  document.getElementById('celebrate').classList.add('show');
  document.getElementById('celebrateSub').textContent=`完成 ${count} 项 · 今天辛苦了 ✨`;
}

// ══ YEAR VIEW ══
function renderYear(){
  const year=2026,months=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],wds=['一','二','三','四','五','六','日'];
  let html='<div class="months-grid">';
  for(let m=0;m<12;m++){
    html+=`<div><div class="month-name">${year} · ${months[m]}</div>`;
    html+=`<div class="weekday-headers">${wds.map(l=>`<div class="weekday-hd">${l}</div>`).join('')}</div><div class="days-grid">`;
    const startDow=(new Date(year,m,1).getDay()+6)%7,daysIn=new Date(year,m+1,0).getDate();
    for(let e=0;e<startDow;e++)html+=`<div class="day-cell empty"></div>`;
    for(let day=1;day<=daysIn;day++){
      const d=new Date(year,m,day),data=loadDayData(d),tasks=effectiveTasks(d);
      const done=tasks.filter(t=>data[t.id+'_done']).length,future=isFuture(d),today=isToday(d);
      let cls='day-cell';
      if(future){}
      else if(today)cls+=' today-cell';
      else if(done===tasks.length&&tasks.length>0)cls+=' full';
      else if(done>0)cls+=' partial';
      html+=`<div class="${cls}" onclick="openDayPopup(${year},${m},${day})">${day}</div>`;
    }
    html+=`</div></div>`;
  }
  document.getElementById('yearGrid').innerHTML=html+'</div>';
}

function openDayPopup(year,month,day){
  const d=new Date(year,month,day);
  const data=loadDayData(d),tasks=effectiveTasks(d);
  const dayNames=['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('popupDate').textContent=`${year}年${month+1}月${day}日 ${dayNames[d.getDay()]}`;
  const done=tasks.filter(t=>data[t.id+'_done']).length;
  if(!done){document.getElementById('popupContent').innerHTML=`<div class="popup-empty">暂无打卡记录</div>`;}
  else{
    document.getElementById('popupContent').innerHTML=tasks.map(t=>{
      const isDone=!!data[t.id+'_done'],note=data[t.id+'_note']||'',photos=data[t.id+'_photos']||[];
      return`<div class="popup-item">
        <div class="popup-check${isDone?'':' no'}">${isDone?`<svg width="9" height="8" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div>
        <div><div class="popup-item-text" style="color:${isDone?'var(--text)':'var(--muted)'}">${t.name}</div>
        ${note?`<div class="popup-note">${note}</div>`:''}
        ${photos.length?`<div class="popup-photos">${photos.map(src=>`<img src="${src}" onclick="openLightbox('${src}')">`).join('')}</div>`:''}
        </div></div>`;
    }).join('');
  }
  document.getElementById('dayPopup').classList.add('show');
}
function closePopup(){document.getElementById('dayPopup').classList.remove('show');}
document.getElementById('dayPopup').addEventListener('click',function(e){if(e.target===this)closePopup();});
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeAddModal();});

// ══ BACKGROUND ══
function handleBgUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    localStorage.setItem('sop_bg',e.target.result);applyBg(e.target.result);
    const p=document.getElementById('bgPreview');p.src=e.target.result;p.classList.add('show');
  };
  reader.readAsDataURL(file);input.value='';
}
function applyBg(src){
  const l=document.getElementById('bgLayer');
  if(src){l.style.backgroundImage=`url(${src})`;document.body.classList.add('has-bg');}
  else{l.style.backgroundImage='';document.body.classList.remove('has-bg');}
}
function updateOverlay(val){
  document.getElementById('overlayVal').textContent=val+'%';
  document.documentElement.style.setProperty('--bg-overlay',`rgba(15,14,12,${(val/100).toFixed(2)})`);
  localStorage.setItem('sop_overlay',val);
}
function removeBg(){
  localStorage.removeItem('sop_bg');applyBg(null);
  const p=document.getElementById('bgPreview');p.src='';p.classList.remove('show');
}
function initBg(){
  const saved=localStorage.getItem('sop_bg');
  if(saved){applyBg(saved);const p=document.getElementById('bgPreview');p.src=saved;p.classList.add('show');}
  const ov=localStorage.getItem('sop_overlay')||'82';
  document.getElementById('overlaySlider').value=ov;updateOverlay(ov);
}

// ══ INIT ══
initBg();
viewingDate=new Date();
buildStrip();
renderDailyView();
</script>
